<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Amelia Restaurant — Inventory</title>

  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Amelia Inventory">
  <meta name="application-name" content="Amelia Inventory">
  <meta name="theme-color" content="#1f5132">
  <meta name="description" content="Amelia Restaurant — Inventory System.">
  <meta name="msapplication-TileImage" content="icon-192.png">
  <meta name="msapplication-TileColor" content="#1f5132">
  <meta name="msapplication-tap-highlight" content="no">
  <meta property="og:title"       content="Amelia Restaurant — Inventory">
  <meta property="og:description" content="Amelia Restaurant Inventory System.">
  <meta property="og:type"        content="website">
  <meta property="og:image"       content="icon-512.png">
  <meta name="twitter:card"       content="summary">
  <link rel="manifest" href="manifest.json">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#faf6ec;width:100vw;height:100vh;overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}

    /* ── SPLASH ── */
    #splash{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;
      align-items:center;justify-content:center;padding:24px;transition:opacity .6s ease;
      background:
        radial-gradient(640px 460px at 80% -8%, rgba(184,134,11,.16), transparent 60%),
        radial-gradient(620px 460px at -8% 110%, rgba(31,81,50,.14), transparent 60%),
        radial-gradient(ellipse at center,#fffdf7 0%,#f7efdc 55%,#efe3c8 100%);}

    .logo-wrap{position:relative;width:212px;height:212px;display:flex;align-items:center;justify-content:center;}
    .logo-ring{position:absolute;inset:14px;border-radius:50%;border:2.5px solid rgba(184,134,11,.55);
      opacity:0;animation:ripple 2.4s cubic-bezier(.2,.6,.3,1) infinite;}
    .logo-ring.r1{animation-delay:0s}
    .logo-ring.r2{animation-delay:.8s}
    .logo-ring.r3{animation-delay:1.6s}
    @keyframes ripple{0%{transform:scale(.84);opacity:0}15%{opacity:.85}100%{transform:scale(1.5);opacity:0}}
    .logo-core{width:208px;height:208px;object-fit:contain;
      animation:pop .6s cubic-bezier(.2,.9,.3,1.4) both, breathe 2.8s ease-in-out .6s infinite;}
    @keyframes pop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
    @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.045)}}
    .core-fallback{width:200px;height:200px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#2f7d4f,#1f5132);box-shadow:0 0 0 3px #1f5132,0 12px 40px rgba(31,81,50,.3);
      animation:breathe 2.8s ease-in-out infinite;}
    .core-fallback svg{width:64px;height:64px;stroke:#e8d9a8;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}

    .app-name{margin-top:26px;font-weight:800;font-size:32px;letter-spacing:.3px;color:#1f5132;font-style:italic;}
    .app-name .b{color:#b8860b;}
    .app-sub{color:#8a7440;font-size:11px;font-weight:800;margin-top:8px;letter-spacing:4px;text-transform:uppercase;}

    #loadbarWrap{margin-top:32px;width:188px;height:7px;border-radius:7px;background:#e7dcc0;overflow:hidden;}
    #loadbarWrap i{display:block;height:100%;width:42%;border-radius:7px;
      background:linear-gradient(90deg,#b8860b,#1f5132);animation:slide 1.2s ease-in-out infinite;}
    @keyframes slide{0%{transform:translateX(-110%)}100%{transform:translateX(330%)}}

    #openBtn{display:none;margin-top:26px;background:#1f5132;color:#fff;border:none;border-radius:100px;
      padding:13px 26px;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 6px 0 #143923;text-decoration:none;}
    #splash .hint{display:none;color:rgba(31,81,50,.55);font-size:11px;margin-top:12px;}

    #app-frame{position:fixed;inset:0;width:100%;height:100%;border:none;z-index:1;background:#faf6ec;}

    #installBanner{display:none;position:fixed;bottom:20px;left:12px;right:12px;z-index:998;
      background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(31,81,50,0.18);border:1.5px solid #e7dcc0;padding:14px 16px;align-items:center;gap:12px;}
    #installBanner img{width:44px;height:44px;border-radius:12px;flex-shrink:0;}
    #installBanner .ib-text{flex:1;min-width:0;}
    #installBanner .ib-title{font-weight:800;font-size:14px;color:#1f5132;}
    #installBanner .ib-sub{font-size:12px;color:#8a7440;margin-top:2px;}
    #installBanner .ib-install{background:#1f5132;color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;flex-shrink:0;}
    #installBanner .ib-close{background:none;border:none;color:#8a7440;font-size:20px;cursor:pointer;padding:4px;flex-shrink:0;line-height:1;}
  </style>
</head>
<body>

  <!-- Hardcoded Apps Script Web App URL for Amelia Restaurant Inventory -->
  <script>
    var APP_URL = "https://script.google.com/macros/s/AKfycbwUO7N6pjfXObGF7G55fe6wPcblTFof_KQMRc5kXjnAZj7i4A4uZiFv8811B8M41p7B/exec";
  </script>

  <div id="splash">
    <div class="logo-wrap">
      <div class="logo-ring r1"></div>
      <div class="logo-ring r2"></div>
      <div class="logo-ring r3"></div>
      <img class="logo-core" src="logo.png" alt="Amelia Restaurant"
           onerror="this.style.display='none'; document.getElementById('core-fallback').style.display='flex';">
      <div class="core-fallback" id="core-fallback" style="display:none;">
        <svg viewBox="0 0 24 24"><path d="M3 2v7a3 3 0 0 0 6 0V2"/><path d="M6 9v13"/><path d="M16 2c-1.5 1-2.5 3-2.5 6 0 2 1 3 2.5 3s2.5-1 2.5-3c0-3-1-5-2.5-6z"/><path d="M16 11v11"/></svg>
      </div>
    </div>
    <div class="app-name">Amel<span class="b">ia</span></div>
    <div class="app-sub">Inventory System</div>

    <div id="loadbarWrap"><i></i></div>

    <a id="openBtn" href="#" target="_blank" rel="noopener">Open the App  &rarr;</a>
    <div class="hint" id="openHint">Taking a while? Tap the button above.</div>
  </div>

  <iframe id="app-frame" allow="fullscreen; clipboard-write; camera; microphone" allowfullscreen></iframe>

  <div id="installBanner">
    <img src="icon-192.png" alt="Amelia Restaurant">
    <div class="ib-text">
      <div class="ib-title">Add to Home Screen</div>
      <div class="ib-sub">Install Amelia Inventory for quick access</div>
    </div>
    <button class="ib-install" onclick="triggerInstall()">Install</button>
    <button class="ib-close"   onclick="dismissInstall()">✕</button>
  </div>

  <script>
    var splash=document.getElementById('splash'), frame=document.getElementById('app-frame'),
        openBtn=document.getElementById('openBtn'), openHint=document.getElementById('openHint');
    function hideSplash(){ splash.style.opacity='0'; setTimeout(function(){ splash.style.display='none'; },600); }

    frame.src = APP_URL; openBtn.href = APP_URL;
    frame.onload = function(){ setTimeout(hideSplash, 800); };
    setTimeout(hideSplash, 6000);
    setTimeout(function(){ openBtn.style.display='inline-block'; openHint.style.display='block'; }, 4500);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(e){console.warn('SW failed',e);}); });
    }
    var deferredPrompt;
    window.addEventListener('beforeinstallprompt', function(e){ e.preventDefault(); deferredPrompt=e; document.getElementById('installBanner').style.display='flex'; });
    window.addEventListener('appinstalled', function(){ document.getElementById('installBanner').style.display='none'; deferredPrompt=null; });
    function triggerInstall(){ if(!deferredPrompt) return; deferredPrompt.prompt(); deferredPrompt.userChoice.then(function(){ deferredPrompt=null; }); }
    function dismissInstall(){ document.getElementById('installBanner').style.display='none'; }
  </script>
</body>
</html>
